[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[program:redis]
command=redis-server --save "" --appendonly no
priority=1
autostart=true
autorestart=true
stdout_logfile=NONE
stderr_logfile=NONE
user=appuser

[program:gunicorn]
directory=/app
command=gunicorn backend.wsgi:application --bind 0.0.0.0:8000
autostart=true
autorestart=true
stdout_logfile=NONE
stderr_logfile=NONE
user=appuser

[program:celeryworker]
directory=/app
command=celery -A backend worker --loglevel=info
autostart=true
autorestart=true
stdout_logfile=NONE
stderr_logfile=NONE
user=appuser

[program:celerybeat]
directory=/app
command=celery -A backend beat --loglevel=info
autostart=true
autorestart=true
stdout_logfile=NONE
stderr_logfile=NONE
user=appuser